<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدارة الحارس الذكي</title>
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef4ff;font-family:Tahoma,Arial,sans-serif;color:#102a5c}.gate{width:min(390px,calc(100% - 40px));padding:28px;border-radius:18px;background:#fff;text-align:center;box-shadow:0 14px 38px #102a5c22}.gate img{width:min(280px,100%)}button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-size:16px;font-weight:800;cursor:pointer}p{min-height:22px;color:#64748b;font-size:13px;line-height:1.7}</style>
</head>
<body><main class="gate"><img src="smart-guardian-logo.svg" alt="Smart Guardian — الحارس الذكي"><h1>إدارة الحارس الذكي</h1><p id="status">سجّل بحساب Google الخاص بالإدارة.</p><button id="login" type="button">دخول الإدارة</button></main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
const auth = getAuth(initializeApp({ apiKey:"AIzaSyAUjRlZmePLlKKRDS8JdM4i9r0eCXcnoek", authDomain:"study-guardian-groups.firebaseapp.com", projectId:"study-guardian-groups", appId:"1:499313905189:web:589c4dfade509c853779cc" })), provider = new GoogleAuthProvider(), status = document.getElementById("status"), login = document.getElementById("login");
const finish = user => { if (user) location.replace("./?admin=1"); };
onAuthStateChanged(auth, finish); getRedirectResult(auth).then(result => finish(result?.user)).catch(() => status.textContent = "تعذر إكمال تسجيل الدخول. حاول مرة أخرى.");
login.onclick = async () => { status.textContent = "جارٍ فتح Google…"; try { const result = await signInWithPopup(auth, provider); finish(result.user); } catch (error) { if (matchMedia("(pointer:coarse)").matches) return signInWithRedirect(auth, provider); status.textContent = "اسمح بالنافذة المنبثقة ثم حاول مرة أخرى."; } };
</script></body></html>
