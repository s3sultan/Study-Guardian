<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدارة الحارس الذكي</title>
  <style>body{margin:0;min-height:100vh;background:#eef4ff;font-family:Tahoma,Arial,sans-serif;color:#102a5c}.page-head{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#102a5c;color:#fff}.home{display:grid;width:36px;height:36px;place-items:center;border-radius:9px;background:#ffffff18;color:#fff;text-decoration:none;font-size:21px}.page-head strong{font-size:16px}.gate{width:min(390px,calc(100% - 40px));margin:clamp(45px,12vh,100px) auto;padding:28px;border-radius:18px;background:#fff;text-align:center;box-shadow:0 14px 38px #102a5c22}.gate img{width:min(280px,100%)}button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-size:16px;font-weight:800;cursor:pointer}p{min-height:22px;color:#64748b;font-size:13px;line-height:1.7}#dashboard{height:calc(100vh - 60px)}iframe{display:block;width:100%;height:100%;border:0}</style>
</head>
<body><header class="page-head"><a class="home" href="./?home=1" aria-label="العودة للرئيسية">⌂</a><strong>إدارة الحارس الذكي</strong></header><main id="gate" class="gate"><img src="smart-guardian-logo.svg" alt="Smart Guardian — الحارس الذكي"><h1>إدارة الحارس الذكي</h1><p id="status">سجّل بحساب Google الخاص بالإدارة.</p><button id="login" type="button">دخول الإدارة</button></main><section id="dashboard" hidden><iframe title="لوحة إدارة الحارس الذكي" src="./?admin=1&embedded=1"></iframe></section>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
const auth = getAuth(initializeApp({ apiKey:"AIzaSyAUjRlZmePLlKKRDS8JdM4i9r0eCXcnoek", authDomain:"study-guardian-groups.firebaseapp.com", projectId:"study-guardian-groups", appId:"1:499313905189:web:589c4dfade509c853779cc" })), provider = new GoogleAuthProvider(), status = document.getElementById("status"), login = document.getElementById("login"), ADMIN_EMAIL = "s2shug@gmail.com";
provider.setCustomParameters({ prompt: "select_account" });
const isGoogleAdminSession = user => Boolean(user && !user.isAnonymous && user.providerData?.some(provider => provider.providerId === "google.com"));
const finish = user => { if (isGoogleAdminSession(user) && user.email?.toLowerCase() === ADMIN_EMAIL) { document.getElementById("gate").hidden = true; document.getElementById("dashboard").hidden = false; } else { document.getElementById("dashboard").hidden = true; document.getElementById("gate").hidden = false; status.textContent = isGoogleAdminSession(user) ? `هذا البريد (${user.email}) ليس حساب الأدمن. اختر الحساب الصحيح.` : "سجّل بحساب Google الخاص بالإدارة."; login.hidden = false; login.textContent = isGoogleAdminSession(user) ? "تغيير حساب Google" : "دخول الإدارة"; } };
onAuthStateChanged(auth, finish); getRedirectResult(auth).then(result => finish(result?.user || auth.currentUser)).catch(() => status.textContent = "تعذر إكمال تسجيل الدخول. حاول مرة أخرى.");
login.onclick = async () => { status.textContent = "جارٍ فتح Google…"; try { await signOut(auth); if (matchMedia("(pointer:coarse)").matches) return signInWithRedirect(auth, provider); const result = await signInWithPopup(auth, provider); finish(result.user); } catch (_) { status.textContent = "تعذر فتح Google. حاول مرة أخرى."; } };
</script></body></html>
